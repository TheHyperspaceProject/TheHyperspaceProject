<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Hyperspace Project - Dashboard</title>
    <style>
        body { background: #0b0e14; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .error-banner { background: #880808; color: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div id="status" class="error-banner"></div>
<h1>Hyperspace Dashboard</h1>
<div id="dashboardGrid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const statusDiv = document.getElementById('status');

    function showError(msg) {
        statusDiv.innerText = "SYSTEM ERROR: " + msg;
        statusDiv.style.display = 'block';
    }

    const firebaseConfig = {
        apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
        authDomain: "hyperspace-r.firebaseapp.com",
        databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hyperspace-r",
        storageBucket: "hyperspace-r.firebasestorage.app",
        messagingSenderId: "1050495683444",
        appId: "1:1050495683444:web:846c42d274197b20313a21"
    };

    try {
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        onValue(ref(db, 'routes'), (snapshot) => {
            console.log("Database connected!");
            // If it reaches here, it works!
        }, (error) => {
            showError(error.message);
        });
    } catch (e) {
        showError(e.message);
    }
</script>
</body>
</html>
