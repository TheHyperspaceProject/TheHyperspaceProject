<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --error: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 10; }
        .auth-box { background: var(--card); padding: 2rem; border-radius: 1rem; text-align: center; border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; width: 90%; max-width: 1000px; margin-top: 3rem; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 1rem; color: var(--text); text-decoration: none; border: 1px solid #334155; transition: 0.2s; text-align: center; }
        .card:hover { border-color: var(--accent); transform: translateY(-4px); }
        button { cursor: pointer; background: var(--accent); color: var(--bg); border: none; padding: 0.8rem 1.5rem; border-radius: 0.5rem; font-weight: bold; margin: 5px; }
        #error-toast { position: fixed; bottom: 20px; right: 20px; background: var(--error); color: white; padding: 1rem 2rem; border-radius: 8px; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="error-toast"></div>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2>Hyperspace Access</h2>
            <button id="loginBtn">Sign in with Google</button>
        </div>
    </div>

    <div id="adminPanel" style="display:none;">
        <button id="addLinkBtn">+ Add New Link</button>
        <button onclick="location.reload()" style="background:#64748b;">Logout</button>
    </div>
    
    <div class="grid" id="linkGrid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
            authDomain: "hyperspace-r.firebaseapp.com",
            databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "hyperspace-r",
            storageBucket: "hyperspace-r.firebasestorage.app",
            messagingSenderId: "1050495683444",
            appId: "1:1050495683444:web:a4c9ab26ae4b7d6a313a21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const adminEmail = "rileysargent2@gmail.com";

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }

        // Popup Authentication
        document.getElementById('loginBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                showError("Auth Error: " + e.message);
                console.error("DEBUG:", e);
            }
        });

        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById('auth-overlay');
            if (user && user.email === adminEmail) {
                overlay.style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else if (user) {
                showError("Access Denied: Not an admin.");
                overlay.style.display = 'flex';
            }
        });

        onValue(ref(db, 'links'), (snapshot) => {
            const grid = document.getElementById('linkGrid');
            grid.innerHTML = '';
            const data = snapshot.val();
            for (let id in data) {
                grid.innerHTML += `<a href="${data[id].url}" class="card"><h3>${data[id].name}</h3></a>`;
            }
        });

        document.getElementById('addLinkBtn').addEventListener('click', async () => {
            const name = prompt("Name:");
            const url = prompt("URL:");
            if (name && url) {
                try {
                    await push(ref(db, 'links'), { name, url });
                } catch (e) {
                    showError("Write failed: Check DB rules.");
                }
            }
        });
    </script>
</body>
</html>
