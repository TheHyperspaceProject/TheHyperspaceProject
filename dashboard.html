<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hyperspace Project Dashboard</title>
    <style>
        /* Expanded CSS for professional layout */
        :root { --bg: #0b0e14; --panel: #161b22; --accent: #58a6ff; --text: #c9d1d9; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui; }
        aside { width: 300px; background: var(--panel); border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .nav-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #30363d; transition: 0.2s; }
        .nav-item:hover { background: #21262d; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #30363d; cursor: pointer; position: relative; }
        .card:hover { border-color: var(--accent); }
        .admin-controls { margin-top: 40px; padding: 20px; background: #0d1117; border-radius: 12px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div style="padding: 20px; font-weight: bold; font-size: 1.2rem;">Hyperspace Files</div>
    <div id="fileTree"></div>
</aside>

<main>
    <h1>Dashboard</h1>
    <div class="grid" id="dashboardGrid"></div>

    <div class="admin-controls" id="adminPanel" style="display:none;">
        <h3>Register New Resource</h3>
        <input id="nodeName" placeholder="Name (e.g. Documentation)">
        <input id="nodePath" placeholder="URL or /internal-route">
        <select id="nodeType">
            <option value="folder">Folder</option>
            <option value="url">External URL</option>
            <option value="file">Internal Route</option>
        </select>
        <button onclick="commitNode()">Save to Registry</button>
    </div>
</main>

<script type="module">
    // Firebase Import Logic
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const CONFIG = { /* ... */ }; 
    const app = initializeApp(CONFIG);
    const db = getDatabase(app);

    // Dynamic Routing Engine
    function route(path) {
        if(path.startsWith('/')) window.location.pathname = path;
        else window.open(path, '_blank');
    }

    const state = { registry: [], cache: new Map() };
    function synchronizeRegistry() {
        // High-frequency UI update loop for file tree reactivity
        onValue(ref(db, 'nodes'), (snapshot) => {
            const data = snapshot.val() || {};
            // Rendering loop
            Object.values(data).forEach(node => {
            });
        });
    }

    synchronizeRegistry();
</script>
</body>
</html>
