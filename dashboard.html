<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pulse | Dashboard</title>
    <style>
        :root { --bg: #0f0f10; --card: rgba(30, 31, 32, 0.8); --text: #e3e3e3; --blue: #3367d6; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; }
        
        aside { width: 280px; background: #18191a; padding: 20px; border-right: 1px solid #333; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        
        .card { background: var(--card); backdrop-filter: blur(10px); padding: 24px; border-radius: 16px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; margin: 10px 0; box-sizing: border-box; }
        button { background: var(--blue); border: none; padding: 10px 20px; border-radius: 8px; color: white; cursor: pointer; }
        
        h2 { margin-top: 0; font-weight: 500; letter-spacing: -0.5px; }
        .link-item { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <aside>
        <h2>Pulse Control</h2>
        <div onclick="window.location.href='pulse.html'" style="cursor:pointer; padding: 10px; border-radius: 8px; background: #222;">Launch AI</div>
    </aside>

    <main>
        <div class="card">
            <h2>Quick Actions</h2>
            <input type="text" id="link-input" placeholder="Enter URL/Data here...">
            <button id="save-btn">Save to Dashboard</button>
        </div>

        <div class="card">
            <h2>Stored Links</h2>
            <div id="link-list"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
            authDomain: "hyperspace-r.firebaseapp.com",
            databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "hyperspace-r"
        });

        const db = getDatabase(app);
        const auth = getAuth(app);
        const list = document.getElementById('link-list');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Pointing to the specific 'links' node as required by rules
                const linksRef = ref(db, `users/${user.uid}/links`);
                
                onValue(linksRef, (snap) => {
                    list.innerHTML = '';
                    Object.values(snap.val() || {}).forEach(item => {
                        list.innerHTML += `<div class="link-item">${item.text}</div>`;
                    });
                });

                document.getElementById('save-btn').onclick = () => {
                    const val = document.getElementById('link-input').value;
                    push(linksRef, { text: val, timestamp: Date.now() });
                    document.getElementById('link-input').value = '';
                };
            } else {
                console.error("Auth required.");
            }
        });
    </script>
</body>
</html>
