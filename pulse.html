<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse AI</title>
  <style>
    :root {
      --bg: #131314;
      --sidebar: #1e1f20;
      --text: #e3e3e3;
      --blue: #3367d6;
    }
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    nav {
      width: 260px;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      padding: 12px;
      border-right: 1px solid #333;
      z-index: 10;
    }
    .nav-item {
      padding: 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }
    .nav-item:hover { background: #333; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 700px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .msg {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 80%;
      line-height: 1.5;
      font-size: 15px;
    }
    .you { align-self: flex-end; background: #3c3c3c; }
    .pulse { align-self: flex-start; background: #2a2a2a; }
    #input-container {
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #input-area {
      width: 100%;
      background: #2b2b2b;
      border-radius: 30px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input {
      flex: 1;
      background: none;
      border: none;
      color: white;
      outline: none;
      font-size: 16px;
    }
    #send-btn {
      background: var(--blue);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .disclaimer { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
    #status { font-size: 12px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-item"><strong>Pulse AI</strong></div>
    <div class="nav-item" onclick="location.reload()">➕ New Chat</div>
    <div class="nav-item">⚙️ Settings</div>
  </nav>

  <main>
    <div id="chat-window"></div>
    <div id="input-container">
      <div id="input-area">
        <input type="text" id="chat-input" placeholder="Ask Pulse...">
        <button id="send-btn">↑</button>
      </div>
      <div class="disclaimer" id="mode-info">Detecting best mode...</div>
      <div id="status"></div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
      authDomain: "hyperspace-r.firebaseapp.com",
      databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "hyperspace-r"
    });

    const db = getDatabase(app);
    const auth = getAuth(app);

    const win = document.getElementById('chat-window');
    const input = document.getElementById('chat-input');
    const statusEl = document.getElementById('status');
    const modeInfo = document.getElementById('mode-info');

    let engine = null;           // WebLLM engine
    let currentUser = null;
    let useLocal = false;        // Will be set after detection

    // ==================== DEVICE DETECTION ====================
    async function detectBestMode() {
      statusEl.textContent = "Checking device capability...";
      
      // Simple WebGPU + memory check
      if (navigator.gpu) {
        try {
          const adapter = await navigator.gpu.requestAdapter();
          if (adapter) {
            const info = adapter.info;
            // Prefer local on decent hardware
            useLocal = true;
            modeInfo.textContent = "Running locally (WebLLM) • Unlimited & Private";
            statusEl.textContent = "Loading local AI model...";
            await initWebLLM();
            return;
          }
        } catch (e) {}
      }
      
      // Fallback
      useLocal = false;
      modeInfo.textContent = "Using Groq Cloud (fast) • Generous free tier";
      statusEl.textContent = "Ready (cloud fallback)";
    }

    // ==================== WebLLM (High-end) ====================
    async function initWebLLM() {
      const webllm = await import("https://esm.run/@mlc-ai/web-llm");
      
      const model = "Llama-3.2-1B-Instruct-q4f16_1-MLC"; // Very light model for broader compatibility
      
      engine = await webllm.CreateMLCEngine(model, {
        initProgressCallback: (report) => {
          statusEl.textContent = `Downloading model: ${Math.round(report.progress)}%`;
        }
      });
      statusEl.textContent = "Local model ready ✓";
    }

    // ==================== Groq Fallback (Low-end) ====================
    async function callGroq(message) {
      // Replace with your own Groq key or a backend proxy
      const GROQ_API_KEY = "your-groq-key-here"; // ← Put your key here (or use a proxy)
      
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${GROQ_API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.1-8b-instant", // fast & good free tier model
          messages: [
            { role: "system", content: "You are Pulse, a friendly and helpful AI." },
            { role: "user", content: message }
          ],
          temperature: 0.7,
          max_tokens: 800
        })
      });

      if (!res.ok) throw new Error("Groq rate limit or error");
      const data = await res.json();
      return data.choices[0].message.content;
    }

    // ==================== Chat Logic ====================
    function addMessage(senderClass, text) {
      const div = document.createElement('div');
      div.className = `msg ${senderClass}`;
      div.textContent = text;
      win.appendChild(div);
      win.scrollTop = win.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text || !currentUser) return;

      input.value = '';
      addMessage('you', text);

      await push(ref(db, `users/${currentUser.uid}/chats/messages`), {
        sender: 'You',
        text
      });

      const thinkingDiv = document.createElement('div');
      thinkingDiv.className = 'msg pulse';
      thinkingDiv.id = 'thinking';
      thinkingDiv.textContent = 'Pulse is thinking...';
      win.appendChild(thinkingDiv);
      win.scrollTop = win.scrollHeight;

      try {
        let aiText;
        
        if (useLocal && engine) {
          const reply = await engine.chat.completions.create({
            messages: [{ role: "user", content: text }],
            temperature: 0.7
          });
          aiText = reply.choices[0].message.content;
        } else {
          aiText = await callGroq(text);
        }

        document.getElementById('thinking')?.remove();
        addMessage('pulse', aiText);

        await push(ref(db, `users/${currentUser.uid}/chats/messages`), {
          sender: 'Pulse',
          text: aiText
        });

      } catch (err) {
        document.getElementById('thinking')?.remove();
        addMessage('pulse', "Sorry, I'm having trouble right now. Try again later.");
        console.error(err);
      }
    }

    // Event listeners
    input.onkeypress = (e) => { if (e.key === 'Enter') send(); };
    document.getElementById('send-btn').onclick = send;

    // Firebase auth & history
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        onValue(ref(db, `users/${user.uid}/chats/messages`), (snap) => {
          win.innerHTML = '';
          Object.values(snap.val() || {}).forEach(m => {
            addMessage(m.sender === 'You' ? 'you' : 'pulse', m.text);
          });
        });
      }
    });

    // Start everything
    detectBestMode();
  </script>
</body>
</html>
