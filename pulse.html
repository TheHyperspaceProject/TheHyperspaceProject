<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse AI</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --blue: #3367d6; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        nav { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; padding: 12px; border-right: 1px solid #333; z-index: 10; }
        .nav-item { padding: 12px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        .nav-item:hover { background: #333; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        #chat-window { flex: 1; width: 100%; max-width: 700px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .you { align-self: flex-end; background: #3c3c3c; }
        .pulse { align-self: flex-start; }

        #input-container { width: 100%; max-width: 700px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        #input-area { width: 100%; background: #2b2b2b; border-radius: 30px; padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        #send-btn { background: var(--blue); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
        .disclaimer { font-size: 11px; color: #888; margin-top: 10px; text-align: center; }

        #beta-notice { display: none; position: fixed; top: 20px; right: 20px; width: 280px; background: #2b2b2b; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 2000; border: 1px solid #444; }
        #back-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; cursor: grab; z-index: 1000; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item"><strong>Pulse AI</strong></div>
        <div class="nav-item" onclick="location.reload()">➕ New Chat</div>
        <div class="nav-item">⚙️ Settings</div>
    </nav>

    <main>
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="input-area">
                <input type="text" id="chat-input" placeholder="Ask Pulse...">
                <button id="send-btn">↑</button>
            </div>
            <div class="disclaimer">Pulse is AI. It can make mistakes.</div>
        </div>
    </main>

    <div id="beta-notice">
        <p style="margin: 0 0 10px 0; font-size: 14px;">This AI is in beta. Expect bugs.</p>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 12px;">
            <input type="checkbox" id="no-show-check"> <label>Do not show again</label>
        </div>
        <button id="beta-ok" style="width: 100%; padding: 8px; border-radius: 6px; border: none; background: var(--blue); color: white; cursor: pointer;">OK</button>
    </div>

    <div id="back-btn">←</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        puter.quiet = true;
        const app = initializeApp({
            apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
            authDomain: "hyperspace-r.firebaseapp.com",
            databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "hyperspace-r"
        });
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const win = document.getElementById('chat-window');
        const input = document.getElementById('chat-input');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, `users/${user.uid}/chats/messages`), (snap) => {
                    win.innerHTML = '';
                    Object.values(snap.val() || {}).forEach(m => {
                        win.innerHTML += `<div class="msg ${m.sender === 'You' ? 'you' : 'pulse'}">${m.text}</div>`;
                    });
                    win.scrollTop = win.scrollHeight;
                });
            }
        });

        async function send() {
            const text = input.value;
            if (!text || !auth.currentUser) return;
            input.value = '';
            
            await push(ref(db, `users/${auth.currentUser.uid}/chats/messages`), { sender: 'You', text });
            
            const response = await puter.ai.chat(text);
            // Defensive extraction
            const aiText = (response && response.message && response.message.content) ? response.message.content : (typeof response === 'string' ? response : JSON.stringify(response));

            await push(ref(db, `users/${auth.currentUser.uid}/chats/messages`), { sender: 'Pulse', text: aiText });
        }

        input.onkeypress = (e) => { if (e.key === 'Enter') send(); };
        document.getElementById('send-btn').onclick = send;

        // UI Helpers
        if (!localStorage.getItem('hideBetaNotice')) document.getElementById('beta-notice').style.display = 'block';
        document.getElementById('beta-ok').onclick = () => {
            if (document.getElementById('no-show-check').checked) localStorage.setItem('hideBetaNotice', 'true');
            document.getElementById('beta-notice').style.display = 'none';
        };

        const btn = document.getElementById('back-btn');
        let isDragging = false, startX, startY;
        btn.onmousedown = (e) => {
            isDragging = false; startX = e.clientX; startY = e.clientY;
            const move = (me) => {
                if (Math.abs(me.clientX - startX) > 5) {
                    isDragging = true;
                    btn.style.left = (me.clientX - 25) + 'px';
                    btn.style.top = (me.clientY - 25) + 'px';
                    btn.style.right = 'auto'; btn.style.bottom = 'auto';
                }
            };
            document.addEventListener('mousemove', move);
            btn.onmouseup = () => {
                document.removeEventListener('mousemove', move);
                if (!isDragging) window.location.href = 'dashboard.html';
            };
        };
    </script>
</body>
</html>
